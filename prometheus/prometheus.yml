global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: cadvisor
    static_configs:
      - targets:
          - cadvisor:8080

  - job_name: statsd-exporter
    static_configs:
      - targets:
          - statsd-exporter:9102

  - job_name: haproxy
    metrics_path: /metrics
    params:
      extra-counters: ["on"]
    static_configs:
      - targets:
          - haproxy:8405

  - job_name: flink
    static_configs:
      - targets:
          - flink-jobmanager:9250
          - flink-taskmanager-1:9250
          - flink-taskmanager-2:9250

  - job_name: seaweedfs
    metrics_path: /metrics
    static_configs:
      - targets:
          - seaweedfs-master1:9327
          - seaweedfs-master2:9327
          - seaweedfs-master3:9327
          - seaweedfs-volume1:9327
          - seaweedfs-volume2:9327
          - seaweedfs-volume3:9327
          - seaweedfs-filer:9327
          - seaweedfs-s3:9327

  - job_name: postgres-rw
    static_configs:
      - targets:
          - postgres-exporter-rw:9187

  - job_name: apicurio-registry
    metrics_path: /metrics
    static_configs:
      - targets:
          - apicurio-registry:8080
