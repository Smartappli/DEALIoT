x-flink-py-build: &flink-py-build
  context: .
  dockerfile: flink/Dockerfile.pyflink
  args:
    FLINK_BASE_IMAGE: "apache/flink:2.0.0-scala_2.12-java17"
    FLINK_KAFKA_CONNECTOR_VERSION: "4.0.1"
    FLINK_KAFKA_CONNECTOR_SRC_URL: "https://downloads.apache.org/flink/flink-connector-kafka-4.0.1/flink-connector-kafka-4.0.1-src.tgz"

x-etcd-health: &etcd-health
  healthcheck:
    test:
      [
        "CMD",
        "/usr/local/bin/etcdctl",
        "--endpoints=http://127.0.0.1:2379",
        "endpoint",
        "health"
      ]
    interval: 10s
    timeout: 5s
    retries: 12
    start_period: 20s

x-apicurio-env: &apicurio-env
  APICURIO_STORAGE_KIND: "kafkasql"
  APICURIO_KAFKASQL_BOOTSTRAP_SERVERS: "kafka1:9092,kafka2:9092,kafka3:9092"
  APICURIO_KAFKASQL_TOPIC: "kafkasql-journal-v3"
  APICURIO_KAFKASQL_SNAPSHOTS_TOPIC: "kafkasql-snapshots-v3"
  APICURIO_EVENTS_KAFKA_TOPIC: "registry-events-v3"
  APICURIO_KAFKASQL_TOPIC_AUTO_CREATE: "false"
  APICURIO_STORAGE_ENABLE_AUTOMATIC_GROUP_CREATION: "true"

services:
  etcd1:
    image: registry.k8s.io/etcd:v3.6.9
    container_name: etcd1
    hostname: etcd1
    restart: unless-stopped
    environment:
      ETCDCTL_API: "3"
    networks:
      - patroni_backend
    volumes:
      - etcd1_data:/etcd-data
    command:
      - /usr/local/bin/etcd
      - --name=etcd1
      - --data-dir=/etcd-data
      - --listen-client-urls=http://0.0.0.0:2379
      - --advertise-client-urls=http://etcd1:2379
      - --listen-peer-urls=http://0.0.0.0:2380
      - --initial-advertise-peer-urls=http://etcd1:2380
      - --initial-cluster=etcd1=http://etcd1:2380,etcd2=http://etcd2:2380,etcd3=http://etcd3:2380
      - --initial-cluster-state=new
      - --initial-cluster-token=patroni-etcd-cluster
    <<: *etcd-health

  etcd2:
    image: registry.k8s.io/etcd:v3.6.9
    container_name: etcd2
    hostname: etcd2
    restart: unless-stopped
    environment:
      ETCDCTL_API: "3"
    networks:
      - patroni_backend
    volumes:
      - etcd2_data:/etcd-data
    command:
      - /usr/local/bin/etcd
      - --name=etcd2
      - --data-dir=/etcd-data
      - --listen-client-urls=http://0.0.0.0:2379
      - --advertise-client-urls=http://etcd2:2379
      - --listen-peer-urls=http://0.0.0.0:2380
      - --initial-advertise-peer-urls=http://etcd2:2380
      - --initial-cluster=etcd1=http://etcd1:2380,etcd2=http://etcd2:2380,etcd3=http://etcd3:2380
      - --initial-cluster-state=new
      - --initial-cluster-token=patroni-etcd-cluster
    <<: *etcd-health

  etcd3:
    image: registry.k8s.io/etcd:v3.6.9
    container_name: etcd3
    hostname: etcd3
    restart: unless-stopped
    environment:
      ETCDCTL_API: "3"
    networks:
      - patroni_backend
    volumes:
      - etcd3_data:/etcd-data
    command:
      - /usr/local/bin/etcd
      - --name=etcd3
      - --data-dir=/etcd-data
      - --listen-client-urls=http://0.0.0.0:2379
      - --advertise-client-urls=http://etcd3:2379
      - --listen-peer-urls=http://0.0.0.0:2380
      - --initial-advertise-peer-urls=http://etcd3:2380
      - --initial-cluster=etcd1=http://etcd1:2380,etcd2=http://etcd2:2380,etcd3=http://etcd3:2380
      - --initial-cluster-state=new
      - --initial-cluster-token=patroni-etcd-cluster
    <<: *etcd-health

  pg1:
    image: timescale/timescaledb-ha:pg18.3-ts2.25.2
    container_name: pg1
    hostname: pg1
    restart: unless-stopped
    shm_size: "1gb"
    depends_on:
      etcd1:
        condition: service_healthy
      etcd2:
        condition: service_healthy
      etcd3:
        condition: service_healthy
    networks:
      - patroni_backend
    volumes:
      - pg1_data:/home/postgres/pgdata
      - ./patroni/pg1.yml.tmpl:/home/postgres/postgres.yml.tmpl:ro
      - ./scripts/start-patroni.sh:/scripts/start-patroni.sh:ro
      - ./scripts/post-bootstrap.sh:/scripts/post-bootstrap.sh:ro
    secrets:
      - postgres_superuser_password
      - patroni_repl_password
      - patroni_rewind_password
      - app_user_password
      - postgres_exporter_password
      - debezium_password
    entrypoint: ["/bin/sh", "/scripts/start-patroni.sh"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -q -h 127.0.0.1 -p 5432 -d postgres || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 180s

  pg2:
    image: timescale/timescaledb-ha:pg18.3-ts2.25.2
    container_name: pg2
    hostname: pg2
    restart: unless-stopped
    shm_size: "1gb"
    depends_on:
      etcd1:
        condition: service_healthy
      etcd2:
        condition: service_healthy
      etcd3:
        condition: service_healthy
    networks:
      - patroni_backend
    volumes:
      - pg2_data:/home/postgres/pgdata
      - ./patroni/pg2.yml.tmpl:/home/postgres/postgres.yml.tmpl:ro
      - ./scripts/start-patroni.sh:/scripts/start-patroni.sh:ro
      - ./scripts/post-bootstrap.sh:/scripts/post-bootstrap.sh:ro
    secrets:
      - postgres_superuser_password
      - patroni_repl_password
      - patroni_rewind_password
      - app_user_password
      - postgres_exporter_password
      - debezium_password
    entrypoint: ["/bin/sh", "/scripts/start-patroni.sh"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -q -h 127.0.0.1 -p 5432 -d postgres || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 180s

  pg3:
    image: timescale/timescaledb-ha:pg18.3-ts2.25.2
    container_name: pg3
    hostname: pg3
    restart: unless-stopped
    shm_size: "1gb"
    depends_on:
      etcd1:
        condition: service_healthy
      etcd2:
        condition: service_healthy
      etcd3:
        condition: service_healthy
    networks:
      - patroni_backend
    volumes:
      - pg3_data:/home/postgres/pgdata
      - ./patroni/pg3.yml.tmpl:/home/postgres/postgres.yml.tmpl:ro
      - ./scripts/start-patroni.sh:/scripts/start-patroni.sh:ro
      - ./scripts/post-bootstrap.sh:/scripts/post-bootstrap.sh:ro
    secrets:
      - postgres_superuser_password
      - patroni_repl_password
      - patroni_rewind_password
      - app_user_password
      - postgres_exporter_password
      - debezium_password
    entrypoint: ["/bin/sh", "/scripts/start-patroni.sh"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -q -h 127.0.0.1 -p 5432 -d postgres || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 180s

  haproxy:
    image: haproxy:lts
    container_name: haproxy-patroni
    hostname: haproxy
    restart: unless-stopped
    depends_on:
      pg1:
        condition: service_healthy
      pg2:
        condition: service_healthy
      pg3:
        condition: service_healthy
    networks:
      - patroni_backend
      - patroni_frontend
    ports:
      - "5432:5432"
      - "5433:5433"
      - "7000:7000"
      - "8405:8405"
    volumes:
      - ./haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    command: ["haproxy", "-W", "-db", "-f", "/usr/local/etc/haproxy/haproxy.cfg"]

  pgbouncer-rw:
    image: edoburu/pgbouncer:v1.25.1-p0
    container_name: pgbouncer-rw
    hostname: pgbouncer-rw
    restart: unless-stopped
    depends_on:
      haproxy:
        condition: service_started
        restart: true
    networks:
      - patroni_backend
      - patroni_frontend
    ports:
      - "6432:5432"
    environment:
      DB_HOST: haproxy
      DB_PORT: "5432"
      DB_NAME: appdb
      DB_USER: app_user
      AUTH_TYPE: plain
      POOL_MODE: session
      MAX_CLIENT_CONN: "500"
      DEFAULT_POOL_SIZE: "50"
    secrets:
      - app_user_password
      - source: pgbouncer_rw_userlist
        target: userlist.txt
    volumes:
      - ./pgbouncer/rw.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./scripts/start-pgbouncer-rw.sh:/scripts/start-pgbouncer-rw.sh:ro
    entrypoint: ["/bin/sh", "/scripts/start-pgbouncer-rw.sh"]

  pgbouncer-ro:
    image: edoburu/pgbouncer:v1.25.1-p0
    container_name: pgbouncer-ro
    hostname: pgbouncer-ro
    restart: unless-stopped
    depends_on:
      haproxy:
        condition: service_started
        restart: true
    networks:
      - patroni_backend
      - patroni_frontend
    ports:
      - "6433:5432"
    environment:
      DB_HOST: haproxy
      DB_PORT: "5433"
      DB_NAME: appdb
      DB_USER: app_user
      AUTH_TYPE: plain
      POOL_MODE: session
      MAX_CLIENT_CONN: "500"
      DEFAULT_POOL_SIZE: "50"
    secrets:
      - app_user_password
      - source: pgbouncer_ro_userlist
        target: userlist.txt
    volumes:
      - ./pgbouncer/ro.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./scripts/start-pgbouncer-ro.sh:/scripts/start-pgbouncer-ro.sh:ro
    entrypoint: ["/bin/sh", "/scripts/start-pgbouncer-ro.sh"]

  vernemq1:
    image: vernemq/vernemq:2.1.2
    container_name: vernemq1
    restart: unless-stopped
    environment:
      <<: *vernemq-env
    ports:
      - "1883:1883"
      - "8080:8080"
    volumes:
      - vernemq1_data:/vernemq/data
    networks:
      - ingest_net
    healthcheck:
      test: ["CMD-SHELL", "vernemq ping | grep -q pong"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  vernemq2:
    image: vernemq/vernemq:2.1.2
    container_name: vernemq2
    restart: unless-stopped
    depends_on:
      vernemq1:
        condition: service_healthy
    environment:
      <<: *vernemq-env
      DOCKER_VERNEMQ_DISCOVERY_NODE: "vernemq1"
    volumes:
      - vernemq2_data:/vernemq/data
    networks:
      - ingest_net
    healthcheck:
      test: ["CMD-SHELL", "vernemq ping | grep -q pong"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  vernemq3:
    image: vernemq/vernemq:2.1.2
    container_name: vernemq3
    restart: unless-stopped
    depends_on:
      vernemq1:
        condition: service_healthy
    environment:
      <<: *vernemq-env
      DOCKER_VERNEMQ_DISCOVERY_NODE: "vernemq1"
    volumes:
      - vernemq3_data:/vernemq/data
    networks:
      - ingest_net
    healthcheck:
      test: ["CMD-SHELL", "vernemq ping | grep -q pong"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  kafka1:
    image: apache/kafka:4.2.0
    container_name: kafka1
    hostname: kafka1
    restart: unless-stopped
    environment:
      <<: *kafka-env
      KAFKA_NODE_ID: "1"
      KAFKA_LISTENERS: "INTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:19092"
      KAFKA_ADVERTISED_LISTENERS: "INTERNAL://kafka1:9092,EXTERNAL://${KAFKA_EXTERNAL_HOST:-localhost}:19092"
    ports:
      - "19092:19092"
    volumes:
      - kafka1_data:/var/lib/kafka/data
    networks:
      - kafka_net
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 30s

  kafka2:
    image: apache/kafka:4.2.0
    container_name: kafka2
    hostname: kafka2
    restart: unless-stopped
    environment:
      <<: *kafka-env
      KAFKA_NODE_ID: "2"
      KAFKA_LISTENERS: "INTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:19093"
      KAFKA_ADVERTISED_LISTENERS: "INTERNAL://kafka2:9092,EXTERNAL://${KAFKA_EXTERNAL_HOST:-localhost}:19093"
    ports:
      - "19093:19093"
    volumes:
      - kafka2_data:/var/lib/kafka/data
    networks:
      - kafka_net
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 30s

  kafka3:
    image: apache/kafka:4.2.0
    container_name: kafka3
    hostname: kafka3
    restart: unless-stopped
    environment:
      <<: *kafka-env
      KAFKA_NODE_ID: "3"
      KAFKA_LISTENERS: "INTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:19094"
      KAFKA_ADVERTISED_LISTENERS: "INTERNAL://kafka3:9092,EXTERNAL://${KAFKA_EXTERNAL_HOST:-localhost}:19094"
    ports:
      - "19094:19094"
    volumes:
      - kafka3_data:/var/lib/kafka/data
    networks:
      - kafka_net
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 30s

  kafka-init:
    image: apache/kafka:4.2.0
    container_name: kafka-init
    depends_on:
      kafka1:
        condition: service_healthy
      kafka2:
        condition: service_healthy
      kafka3:
        condition: service_healthy
    restart: "no"
    command:
      - /bin/sh
      - -ec
      - >
        until /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka1:9092 --list >/dev/null 2>&1;
        do
          echo "Waiting for Kafka...";
          sleep 3;
        done;
        /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --bootstrap-server kafka1:9092 --topic raw.gps --partitions 24 --replication-factor 3;
        /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --bootstrap-server kafka1:9092 --topic raw.sensor --partitions 24 --replication-factor 3;
        /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --bootstrap-server kafka1:9092 --topic raw.image2d.meta --partitions 12 --replication-factor 3;
        /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --bootstrap-server kafka1:9092 --topic raw.image3d.meta --partitions 12 --replication-factor 3;
        /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --bootstrap-server kafka1:9092 --topic raw.video2d.meta --partitions 12 --replication-factor 3;
        /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --bootstrap-server kafka1:9092 --topic raw.video3d.meta --partitions 12 --replication-factor 3;
        /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --bootstrap-server kafka1:9092 --topic media.object.events --partitions 12 --replication-factor 3;
        /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --bootstrap-server kafka1:9092 --topic features.events --partitions 24 --replication-factor 3;
        /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --bootstrap-server kafka1:9092 --topic alerts.events --partitions 12 --replication-factor 3;
        /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --bootstrap-server kafka1:9092 --topic dlq.events --partitions 12 --replication-factor 3;
        /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --bootstrap-server kafka1:9092 --topic kafkasql-journal-v3 --partitions 1 --replication-factor 3 --config cleanup.policy=delete --config retention.ms=-1 --config retention.bytes=-1;
        /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --bootstrap-server kafka1:9092 --topic kafkasql-snapshots-v3 --partitions 1 --replication-factor 3 --config cleanup.policy=delete --config retention.ms=-1 --config retention.bytes=-1;
        /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --bootstrap-server kafka1:9092 --topic registry-events-v3 --partitions 1 --replication-factor 3 --config cleanup.policy=delete --config retention.ms=-1 --config retention.bytes=-1;
        /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --bootstrap-server kafka1:9092 --topic __connect-configs --partitions 1 --replication-factor 3 --config cleanup.policy=compact;
        /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --bootstrap-server kafka1:9092 --topic __connect-offsets --partitions 12 --replication-factor 3 --config cleanup.policy=compact;
        /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --bootstrap-server kafka1:9092 --topic __connect-status --partitions 6 --replication-factor 3 --config cleanup.policy=compact;
        /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --bootstrap-server kafka1:9092 --topic __debezium-heartbeat.appdb --partitions 1 --replication-factor 3 --config min.insync.replicas=2;
        /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --bootstrap-server kafka1:9092 --topic state-latest --partitions 12 --replication-factor 3 --config cleanup.policy=compact --config min.cleanable.dirty.ratio=0.1 --config delete.retention.ms=86400000 --config min.insync.replicas=2;
        /opt/kafka/bin/kafka-configs.sh --bootstrap-server kafka1:9092 --alter --entity-type topics --entity-name state-latest --add-config cleanup.policy=compact,min.cleanable.dirty.ratio=0.1,delete.retention.ms=86400000,min.insync.replicas=2;
        echo "Kafka topics created."
    networks:
      - kafka_net

  kafka-connect:
    image: quay.io/debezium/connect:3.4
    container_name: kafka-connect
    hostname: kafka-connect
    restart: unless-stopped
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      apicurio-registry:
        condition: service_started
    environment:
      BOOTSTRAP_SERVERS: "kafka1:9092,kafka2:9092,kafka3:9092"
      GROUP_ID: "connect-cluster-1"
      CONFIG_STORAGE_TOPIC: "__connect-configs"
      OFFSET_STORAGE_TOPIC: "__connect-offsets"
      STATUS_STORAGE_TOPIC: "__connect-status"
      CONFIG_STORAGE_REPLICATION_FACTOR: "3"
      OFFSET_STORAGE_REPLICATION_FACTOR: "3"
      STATUS_STORAGE_REPLICATION_FACTOR: "3"
      ENABLE_APICURIO_CONVERTERS: "true"
      CONNECT_REST_ADVERTISED_HOST_NAME: "kafka-connect"
      CONNECT_REST_PORT: "8083"
    ports:
      - "8083:8083"
    networks:
      - kafka_net
      - patroni_frontend
      - orchestration_net
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8083/connectors >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 40s

  kafka-connect-init:
    image: curlimages/curl:8.18.0
    container_name: kafka-connect-init
    restart: "no"
    depends_on:
      kafka-connect:
        condition: service_healthy
      haproxy:
        condition: service_started
    volumes:
      - ./kafka-connect/connectors:/connectors:ro
    secrets:
      - debezium_password
    entrypoint:
      - /bin/sh
      - -ec
      - |
        set -eu
        DEBEZIUM_PASSWORD="$$(tr -d '\r\n' </run/secrets/debezium_password)"
        ESCAPED_DEBEZIUM_PASSWORD="$$(printf '%s' "$$DEBEZIUM_PASSWORD" | sed -e 's/[\/&]/\\&/g')"

        sed "s/__INJECT_AT_RUNTIME__/$$ESCAPED_DEBEZIUM_PASSWORD/g" \
          /connectors/timescaledb-source.json >/tmp/timescaledb-source.json

        until curl -fsS http://kafka-connect:8083/connectors >/dev/null; do
          echo "Waiting for Kafka Connect..."
          sleep 3
        done

        until curl -fsS http://haproxy:7000/ >/dev/null 2>&1; do
          echo "Waiting for HAProxy / Patroni frontend..."
          sleep 3
        done

        if curl -fsS http://kafka-connect:8083/connectors/timescaledb-source >/dev/null 2>&1; then
          echo "Connector timescaledb-source already exists."
        else
          http_code="$$(curl -sS -o /tmp/connect-response.json -w '%{http_code}' \
            -X POST http://kafka-connect:8083/connectors \
            -H "Content-Type: application/json" \
            --data @/tmp/timescaledb-source.json || true)"
          cat /tmp/connect-response.json || true
          test "$$http_code" = "201"
        fi
    networks:
      - kafka_net
      - patroni_frontend
      - orchestration_net

