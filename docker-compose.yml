  seaweedfs-pg-init:
    image: postgres:18-alpine
    container_name: seaweedfs-pg-init
    restart: "no"
    depends_on:
      haproxy:
        condition: service_started
    secrets:
      - postgres_superuser_password
      - seaweedfs_pg_password
    entrypoint:
      - /bin/sh
      - -ec
      - |
        set -eu

        export PGPASSWORD="$$(tr -d '\r\n' </run/secrets/postgres_superuser_password)"
        SEAWEEDFS_PG_PASSWORD="$$(tr -d '\r\n' </run/secrets/seaweedfs_pg_password)"

        until pg_isready -h haproxy -p 5432 -U postgres >/dev/null 2>&1; do
          echo "Waiting for PostgreSQL RW endpoint..."
          sleep 3
        done

        until psql -h haproxy -p 5432 -U postgres -d postgres -tAc "SELECT CASE WHEN pg_is_in_recovery() OR current_setting('transaction_read_only') = 'on' THEN 0 ELSE 1 END" | grep -q 1; do
          echo "Waiting for writable PostgreSQL leader endpoint..."
          sleep 3
        done

        echo "Testing postgres login..."
        psql -h haproxy -p 5432 -U postgres -d postgres -v ON_ERROR_STOP=1 -c "SELECT current_user;"

        if ! psql -h haproxy -p 5432 -U postgres -d postgres -tAc "SELECT 1 FROM pg_roles WHERE rolname='seaweedfs_filer'" | grep -q 1; then
          psql -h haproxy -p 5432 -U postgres -d postgres -v ON_ERROR_STOP=1 \
            -c "CREATE ROLE seaweedfs_filer LOGIN PASSWORD '$$SEAWEEDFS_PG_PASSWORD';"
        else
          echo "Role seaweedfs_filer already exists."
        fi

        if ! psql -h haproxy -p 5432 -U postgres -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname='seaweedfs'" | grep -q 1; then
          psql -h haproxy -p 5432 -U postgres -d postgres -v ON_ERROR_STOP=1 \
            -c "CREATE DATABASE seaweedfs OWNER seaweedfs_filer;"
        else
          echo "Database seaweedfs already exists."
        fi

        psql -h haproxy -p 5432 -U postgres -d seaweedfs -v ON_ERROR_STOP=1 <<'SQL'
        ALTER DATABASE seaweedfs OWNER TO seaweedfs_filer;
        GRANT ALL PRIVILEGES ON DATABASE seaweedfs TO seaweedfs_filer;
        SQL

        echo "SeaweedFS PostgreSQL bootstrap done."
    networks:
      - patroni_frontend
    security_opt:
      - no-new-privileges:true
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  seaweedfs-filer:
    image: chrislusf/seaweedfs:4.17
    container_name: seaweedfs-filer
    hostname: seaweedfs-filer
    restart: unless-stopped
    depends_on:
      seaweedfs-master1:
        condition: service_healthy
      seaweedfs-master2:
        condition: service_healthy
      seaweedfs-master3:
        condition: service_healthy
      seaweedfs-volume1:
        condition: service_healthy
      seaweedfs-volume2:
        condition: service_healthy
      seaweedfs-volume3:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      seaweedfs-pg-init:
        condition: service_completed_successfully
    secrets:
      - seaweedfs_pg_password
    entrypoint:
      - /bin/sh
      - -ec
      - |
        set -eu

        mkdir -p /etc/seaweedfs /var/lib/seaweedfs
        SEAWEEDFS_PG_PASSWORD="$$(tr -d '\r\n' </run/secrets/seaweedfs_pg_password)"
        ESCAPED_PG_PASSWORD="$$(printf '%s' "$$SEAWEEDFS_PG_PASSWORD" | sed 's/[\/&]/\\&/g')"

        cat >/tmp/filer.toml <<'EOF'
        [filer.options]
        buckets_folder = "/buckets"

        [postgres2]
        enabled = true
        createTable = """
          CREATE TABLE IF NOT EXISTS "%s" (
            dirhash   BIGINT,
            name      VARCHAR(65535),
            directory VARCHAR(65535),
            meta      bytea,
            PRIMARY KEY (dirhash, name)
          ) WITH (
            fillfactor = 90,
            autovacuum_vacuum_threshold = 100,
            autovacuum_vacuum_scale_factor = 0,
            autovacuum_analyze_threshold = 100,
            autovacuum_analyze_scale_factor = 0,
            autovacuum_vacuum_cost_limit = 2000
          );
        """
        hostname = "haproxy"
        port = 5432
        username = "seaweedfs_filer"
        password = "__SEAWEEDFS_PG_PASSWORD__"
        database = "seaweedfs"
        schema = ""
        sslmode = "disable"
        connection_max_idle = 10
        connection_max_open = 50
        connection_max_lifetime_seconds = 600
        enableUpsert = true
        upsertQuery = """INSERT INTO "%[1]s" (dirhash,name,directory,meta) VALUES($1,$2,$3,$4) ON CONFLICT (dirhash,name) DO UPDATE SET meta = EXCLUDED.meta WHERE "%[1]s".meta != EXCLUDED.meta"""

        [notification.kafka]
        enabled = true
        hosts = ["kafka1:9092", "kafka2:9092", "kafka3:9092"]
        topic = "media.object.events"
        offsetFile = "/var/lib/seaweedfs/seaweedfs-notification.offset"
        offsetSaveIntervalSeconds = 10
        EOF

        sed "s/__SEAWEEDFS_PG_PASSWORD__/$$ESCAPED_PG_PASSWORD/g" /tmp/filer.toml > /etc/seaweedfs/filer.toml

        exec weed filer \
          -ip=seaweedfs-filer \
          -ip.bind=0.0.0.0 \
          -port=8888 \
          -port.grpc=18888 \
          -master=seaweedfs-master1:9333,seaweedfs-master2:9333,seaweedfs-master3:9333 \
          -defaultReplicaPlacement=020 \
          -metricsPort=9327
    ports:
      - "8889:8888"
    volumes:
      - seaweed_filer_offsets:/var/lib/seaweedfs
    networks:
      - orchestration_net
      - kafka_net
      - patroni_frontend
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 30s
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -S --spider http://127.0.0.1:8888/ 2>&1 | grep -Eq 'HTTP/[0-9.]+ (200|301|302|403|404)'"
        ]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  seaweedfs-s3:
    image: chrislusf/seaweedfs:4.17
    container_name: seaweedfs-s3
    hostname: seaweedfs-s3
    restart: unless-stopped
    depends_on:
      seaweedfs-filer:
        condition: service_healthy
    secrets:
      - source: seaweedfs_s3_access_key
        target: seaweedfs_s3_access_key
      - source: seaweedfs_s3_secret_key
        target: seaweedfs_s3_secret_key
    entrypoint:
      - /bin/sh
      - -ec
      - |
        set -eu

        ACCESS_KEY="$$(tr -d '\r\n' </run/secrets/seaweedfs_s3_access_key)"
        SECRET_KEY="$$(tr -d '\r\n' </run/secrets/seaweedfs_s3_secret_key)"

        mkdir -p /etc/seaweedfs

        cat <<EOF | tr -d '\r' > /etc/seaweedfs/s3.json
        {
          "identities": [
            {
              "name": "app",
              "credentials": [
                {
                  "accessKey": "$$ACCESS_KEY",
                  "secretKey": "$$SECRET_KEY"
                }
              ],
              "actions": ["Admin", "Read", "Write", "List", "Tagging"]
            }
          ]
        }
        EOF

        exec weed s3 \
          -filer=seaweedfs-filer:8888 \
          -ip.bind=0.0.0.0 \
          -port=8333 \
          -port.iceberg=0 \
          -metricsPort=9327 \
          -config=/etc/seaweedfs/s3.json
    ports:
      - "8333:8333"
    networks:
      - orchestration_net
      - ingest_net
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 30s
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -S --spider http://127.0.0.1:8333/ 2>&1 | grep -Eq 'HTTP/[0-9.]+ (200|403|405)'"
        ]
      interval: 20s
      timeout: 10s
      retries: 6
      start_period: 40s
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  seaweedfs-init:
    image: amazon/aws-cli:2.26.5
    container_name: seaweedfs-init
    restart: "no"
    depends_on:
      seaweedfs-s3:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    secrets:
      - source: seaweedfs_s3_access_key
        target: seaweedfs_s3_access_key
      - source: seaweedfs_s3_secret_key
        target: seaweedfs_s3_secret_key
    entrypoint:
      - /bin/sh
      - -ec
      - |
        set -eu

        export AWS_ACCESS_KEY_ID="$$(tr -d '\r\n' </run/secrets/seaweedfs_s3_access_key)"
        export AWS_SECRET_ACCESS_KEY="$$(tr -d '\r\n' </run/secrets/seaweedfs_s3_secret_key)"
        export AWS_DEFAULT_REGION="us-east-1"
        export AWS_REGION="us-east-1"
        export AWS_EC2_METADATA_DISABLED="true"

        until aws --endpoint-url http://seaweedfs-s3:8333 s3api list-buckets >/dev/null 2>&1; do
          echo "Waiting for SeaweedFS S3..."
          sleep 3
        done

        create_bucket_if_missing() {
          bucket="$$1"
          if ! aws --endpoint-url http://seaweedfs-s3:8333 s3api head-bucket --bucket "$$bucket" >/dev/null 2>&1; then
            aws --endpoint-url http://seaweedfs-s3:8333 s3api create-bucket --bucket "$$bucket"
          else
            echo "Bucket $$bucket already exists."
          fi
        }

        enable_versioning() {
          bucket="$$1"
          aws --endpoint-url http://seaweedfs-s3:8333 s3api put-bucket-versioning \
            --bucket "$$bucket" \
            --versioning-configuration Status=Enabled
        }

        for bucket in \
          media-raw-2d-images \
          media-raw-3d-images \
          media-raw-2d-videos \
          media-raw-3d-videos \
          media-processed \
          media-derived \
          flink-checkpoints \
          flink-savepoints
        do
          create_bucket_if_missing "$$bucket"
        done

        for bucket in \
          media-raw-2d-images \
          media-raw-3d-images \
          media-raw-2d-videos \
          media-raw-3d-videos \
          media-processed \
          media-derived
        do
          enable_versioning "$$bucket"
        done

        echo "SeaweedFS buckets configured."
    networks:
      - orchestration_net
    security_opt:
      - no-new-privileges:true
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  seaweedfs-edge:
    image: caddy:2.10
    container_name: seaweedfs-edge
    hostname: seaweedfs-edge
    restart: unless-stopped
    depends_on:
      seaweedfs-s3:
        condition: service_healthy
    environment:
      ACME_EMAIL: "${ACME_EMAIL:?define ACME_EMAIL in .env}"
      STORAGE_BASE_DOMAIN: "${STORAGE_BASE_DOMAIN:?define STORAGE_BASE_DOMAIN in .env}"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
    command: ["caddy", "run", "--config", "/etc/caddy/Caddyfile", "--adapter", "caddyfile"]
    networks:
      - orchestration_net

  mqtt-kafka-bridge:
    build:
      context: ./mqtt-kafka-bridge
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      vernemq1:
        condition: service_healthy
    environment:
      MQTT_HOST: "vernemq1"
