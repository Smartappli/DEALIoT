  apicurio-registry-ui:
    image: apicurio/apicurio-registry-ui:3.1.7
    container_name: apicurio-registry-ui
    hostname: apicurio-registry-ui
    restart: unless-stopped
    depends_on:
      apicurio-registry:
        condition: service_started
    environment:
      REGISTRY_API_URL: "${APICURIO_PUBLIC_URL:-http://localhost:8082}/apis/registry/v3"
    ports:
      - "8888:8080"
    networks:
      - orchestration_net

  apicurio-init:
    image: curlimages/curl:8.18.0
    container_name: apicurio-init
    restart: "no"
    depends_on:
      apicurio-registry:
        condition: service_started
    volumes:
      - ./apicurio/bootstrap:/bootstrap:ro
    entrypoint:
      - /bin/sh
      - -ec
      - |
        set -eu

        base="http://apicurio-registry:8080/apis/registry/v3"

        until curl -fsS http://apicurio-registry:8080/health/ready >/dev/null 2>&1; do
          echo "Waiting for Apicurio Registry..."
          sleep 3
        done

        post_artifact() {
          group="$$1"
          artifact="$$2"
          artifact_type="$$3"
          file="$$4"

          if [ ! -f "$$file" ]; then
            echo "Missing schema file: $$file"
            ls -la /bootstrap || true
            exit 1
          fi

          if curl -fsS "$$base/groups/$$group/artifacts/$$artifact" >/dev/null 2>&1; then
            echo "Artifact $$group/$$artifact already exists."
            return 0
          fi

          content_escaped="$$(sed 's/\\/\\\\/g; s/"/\\"/g' "$$file" | awk '{printf "%s\\n", $$0}')"

          cat >/tmp/payload.json <<EOF
        {
          "artifactId": "$$artifact",
          "artifactType": "$$artifact_type",
          "firstVersion": {
            "content": {
              "content": "$$content_escaped",
              "contentType": "application/json"
            }
          }
        }
        EOF

          curl -fsS -X POST "$$base/groups/$$group/artifacts" \
            -H "Content-Type: application/json" \
            --data @/tmp/payload.json

          echo "Artifact created: $$group/$$artifact"
        }

        post_artifact telemetry raw.sensor JSON /bootstrap/raw.sensor.json
        post_artifact telemetry raw.gps JSON /bootstrap/raw.gps.json
        post_artifact media raw.image2d.meta JSON /bootstrap/raw.image2d.meta.json
        post_artifact media raw.image3d.meta JSON /bootstrap/raw.image3d.meta.json
        post_artifact media raw.video2d.meta JSON /bootstrap/raw.video2d.meta.json
        post_artifact media raw.video3d.meta JSON /bootstrap/raw.video3d.meta.json
        post_artifact media media.object.events JSON /bootstrap/media.object.events.json

        echo "Apicurio bootstrap done."
    networks:
      - orchestration_net

  debezium-init:
    image: postgres:18-alpine
    container_name: debezium-init
    restart: "no"
    depends_on:
      haproxy:
        condition: service_started
    secrets:
      - postgres_superuser_password
      - debezium_password
    entrypoint:
      - /bin/sh
      - -ec
      - |
        set -eu

        export PGPASSWORD="$$(tr -d '\r\n' </run/secrets/postgres_superuser_password)"
        DEBEZIUM_PASSWORD="$$(tr -d '\r\n' </run/secrets/debezium_password)"

        until pg_isready -h haproxy -p 5432 -U postgres >/dev/null 2>&1; do
          echo "Waiting for PostgreSQL RW endpoint..."
          sleep 3
        done

        psql -h haproxy -p 5432 -U postgres -d postgres -v ON_ERROR_STOP=1 <<SQL
        DO
        \$\$
        BEGIN
            IF NOT EXISTS (
                SELECT 1 FROM pg_roles WHERE rolname = 'debezium'
            ) THEN
                CREATE ROLE debezium WITH LOGIN REPLICATION PASSWORD '$$DEBEZIUM_PASSWORD';
            ELSE
                ALTER ROLE debezium WITH LOGIN REPLICATION PASSWORD '$$DEBEZIUM_PASSWORD';
            END IF;
        END
        \$\$;

        GRANT CONNECT ON DATABASE appdb TO debezium;
        SQL

        psql -h haproxy -p 5432 -U postgres -d appdb -v ON_ERROR_STOP=1 <<SQL
        GRANT USAGE ON SCHEMA public TO debezium;
        GRANT SELECT ON ALL TABLES IN SCHEMA public TO debezium;
        GRANT SELECT ON ALL SEQUENCES IN SCHEMA public TO debezium;

        ALTER DEFAULT PRIVILEGES IN SCHEMA public
        GRANT SELECT ON TABLES TO debezium;

        ALTER DEFAULT PRIVILEGES IN SCHEMA public
        GRANT SELECT ON SEQUENCES TO debezium;

        DROP PUBLICATION IF EXISTS dbz_publication;
        CREATE PUBLICATION dbz_publication FOR ALL TABLES;
        SQL

        echo "Debezium bootstrap done."
    networks:
      - patroni_frontend

