[databases]
appdb = host=haproxy port=5433 dbname=appdb

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 5432
auth_type = plain
auth_file = /run/secrets/userlist.txt
pool_mode = session
max_client_conn = 500
default_pool_size = 50
admin_users = postgres
server_reset_query = DISCARD ALL
ignore_startup_parameters = extra_float_digits
