[tool.ruff]
line-length = 100
target-version = "py311"
extend-exclude = [
  ".git",
  ".venv",
  "build",
  "dist",
  "grafana",
  "secrets",
]

[tool.ruff.lint]
select = [
  "E",  # pycodestyle errors
  "W",  # pycodestyle warnings
  "F",  # pyflakes
  "B",  # flake8-bugbear
  "C4", # flake8-comprehensions
  "I",  # isort
  "UP", # pyupgrade
  "S",   # bandit-like security checks
  "AIR", # airflow best-practices checks
  "SIM", # simplification suggestions
  "RUF",  # ruff-specific rules
  "PERF", # perflint performance checks
  "PL",   # pylint-derived rules
]
ignore = [
  "E203", # black-compatible slicing spacing
  "W503", # black-compatible binary operator line break
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["S101"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false
disallow_incomplete_defs = false
check_untyped_defs = true
no_implicit_optional = true
show_error_codes = true
pretty = true
exclude = [
  "(^|/)build/",
  "(^|/)dist/",
  "(^|/)grafana/",
  "(^|/)secrets/",
]

[[tool.mypy.overrides]]
module = [
  "airflow.*",
  "kafka.*",
  "confluent_kafka.*",
  "apache_beam.*",
]
ignore_missing_imports = true

[tool.djlint]
profile = "jinja"
indent = 2
max_line_length = 100
format_js = true
format_css = true
ignore = "H006,H030"

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-ra"
