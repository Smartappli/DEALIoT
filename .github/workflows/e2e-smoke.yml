name: E2E Smoke

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "docker-compose*.yml"
      - "scripts/smoke-e2e.sh"
      - "scripts/start-*.sh"
      - "mqtt-kafka-bridge/**"
      - "dealiot_contracts/**"
      - "flink/jobs/**"
      - "apicurio/bootstrap/**"
      - ".github/workflows/e2e-smoke.yml"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  e2e-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    env:
      AIRFLOW_FERNET_KEY: "ci-fernet-key-32-bytes-minimum-value"
      AIRFLOW_API_SECRET_KEY: "ci-api-secret"
      AIRFLOW_JWT_SECRET: "ci-jwt-secret"
      AIRFLOW_ADMIN_PASSWORD: "ci-airflow-admin-password"
      AIRFLOW_DB_PASSWORD: "ci-airflow-db-password"
      VERNEMQ_ADMIN_PASSWORD: "ci-vernemq-admin-password"
      VERNEMQ_DISTRIBUTED_COOKIE: "ci-vernemq-distributed-cookie"
      SEAWEEDFS_S3_ACCESS_KEY: "ci-access-key"
      SEAWEEDFS_S3_SECRET_KEY: "ci-secret-key"
      GRAFANA_ADMIN_PASSWORD: "ci-grafana-admin-password"
      ACME_EMAIL: "ci@example.com"
      STORAGE_BASE_DOMAIN: "local.test"

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Prepare local secret files
        run: |
          mkdir -p secrets
          printf '%s\n' 'ci-postgres-superuser-password' > secrets/postgres_superuser_password.txt
          printf '%s\n' 'ci-patroni-repl-password' > secrets/patroni_repl_password.txt
          printf '%s\n' 'ci-patroni-rewind-password' > secrets/patroni_rewind_password.txt
          printf '%s\n' 'ci-app-user-password' > secrets/app_user_password.txt
          printf '%s\n' 'ci-pgadmin-password' > secrets/pgadmin_default_password.txt
          printf '%s\n' '"app_user" "ci-app-user-password"' > secrets/pgbouncer_rw_userlist.txt
          printf '%s\n' '"app_user" "ci-app-user-password"' > secrets/pgbouncer_ro_userlist.txt
          printf '%s\n' 'ci-postgres-exporter-password' > secrets/postgres_exporter_password.txt
          printf '%s\n' 'ci-debezium-password' > secrets/debezium_password.txt
          printf '%s\n' 'ci-seaweedfs-pg-password' > secrets/seaweedfs_pg_password.txt
          printf '%s\n' 'ci-access-key' > secrets/seaweedfs_s3_access_key.txt
          printf '%s\n' 'ci-secret-key' > secrets/seaweedfs_s3_secret_key.txt

      - name: Run E2E smoke
        run: bash scripts/smoke-e2e.sh

      - name: Dump compose logs on failure
        if: failure()
        run: docker compose -f docker-compose.yml -f docker-compose.dev.yml logs --no-color --timestamps

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.dev.yml down -v --remove-orphans
