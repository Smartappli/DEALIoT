name: Build & Push Docker Images

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: orchestration
            context: ./orchestration
            dockerfile: ./orchestration/Dockerfile
          - image_name: mqtt-kafka-bridge
            context: ./mqtt-kafka-bridge
            dockerfile: ./mqtt-kafka-bridge/Dockerfile
          - image_name: flink-pyflink
            context: .
            dockerfile: ./flink/Dockerfile.pyflink
          - image_name: beam-python-runtime
            context: .
            dockerfile: ./beam/Dockerfile.python-runtime
          - image_name: beam-jobserver
            context: ./beam
            dockerfile: ./beam/Dockerfile.jobserver
          - image_name: beam-python-harness
            context: ./beam
            dockerfile: ./beam/Dockerfile.python-harness

    steps:
      - name: Checkout
        uses: actions/checkout@8ade135a41bc03ea155e62e844d188df1ea18608 # v4.1.7

      - name: Set up Docker Buildx
        run: |
          docker buildx create --name dealiot-builder --use || docker buildx use dealiot-builder
          docker buildx inspect --bootstrap

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build and push ${{ matrix.image_name }}
        run: |
          OWNER_LC="${GITHUB_REPOSITORY_OWNER,,}"
          IMAGE="ghcr.io/${OWNER_LC}/dealiot-${{ matrix.image_name }}"
          TAGS=("--tag" "${IMAGE}:sha-${GITHUB_SHA}")
          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            TAGS+=("--tag" "${IMAGE}:latest")
          fi
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAGS+=("--tag" "${IMAGE}:${GITHUB_REF#refs/tags/}")
          fi
          docker buildx build \
            --push \
            "${TAGS[@]}" \
            --label "org.opencontainers.image.revision=${GITHUB_SHA}" \
            --label "org.opencontainers.image.source=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" \
            --file "${{ matrix.dockerfile }}" \
            "${{ matrix.context }}"
