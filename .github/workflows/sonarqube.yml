name: SonarQube

on:
  push:
    branches: ["main", "master"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sonarqube:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CODACY_PROJECT_TOKEN: ${{ secrets.CODACY_PROJECT_TOKEN }}
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.1.7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b

      - name: Install test dependencies
        run: python -m pip install --upgrade pip coverage

      - name: Generate coverage report
        run: |
          uv run --with boto3 --with pytest --with pytest-cov \
            pytest --cov=. --cov-report=xml --cov-report=term-missing

      - name: Verify coverage report for SonarQube
        run: |
          test -s coverage.xml
          python - <<'PY'
          from pathlib import Path
          text = Path('coverage.xml').read_text(encoding='utf-8')
          if '<coverage ' not in text:
              raise SystemExit('coverage.xml does not look like a coverage report')
          print('coverage.xml generated and valid for SonarQube import')
          PY

      - name: Run codacy-coverage-reporter
        if: ${{ env.CODACY_PROJECT_TOKEN != '' }}
        uses: codacy/codacy-coverage-reporter-action@89d6c85cfafaec52c72b6c5e8b2878d33104c699
        with:
          project-token: ${{ env.CODACY_PROJECT_TOKEN }}
          coverage-reports: "coverage.xml"

      - name: SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v8.0.0
        with:
          args: >-
            -Dsonar.python.coverage.reportPaths=coverage.xml
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL || 'https://sonarcloud.io' }}
