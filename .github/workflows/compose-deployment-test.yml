name: Compose Deployment Smoke Test

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "docker-compose.yml"
      - "scripts/**"
      - ".github/workflows/compose-deployment-test.yml"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  compose-smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      AIRFLOW_FERNET_KEY: "ci-fernet-key-32-bytes-minimum-value"
      AIRFLOW_API_SECRET_KEY: "ci-api-secret"
      AIRFLOW_JWT_SECRET: "ci-jwt-secret"
      SEAWEEDFS_S3_ACCESS_KEY: "ci-access-key"
      SEAWEEDFS_S3_SECRET_KEY: "ci-secret-key"
      ACME_EMAIL: "ci@example.com"
      STORAGE_BASE_DOMAIN: "local.test"

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Validate compose rendering
        run: docker compose -f docker-compose.yml config -q

      - name: Start SeaweedFS stack
        run: |
          docker compose -f docker-compose.yml up -d --wait --wait-timeout 600 \
            seaweedfs-master1 seaweedfs-master2 seaweedfs-master3 \
            seaweedfs-volume1 seaweedfs-volume2 seaweedfs-volume3 \
            seaweedfs-filer seaweedfs-s3

      - name: Check containers status
        run: docker compose -f docker-compose.yml ps

      - name: Dump compose logs on failure
        if: failure()
        run: docker compose -f docker-compose.yml logs --no-color --timestamps

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.yml down -v --remove-orphans
