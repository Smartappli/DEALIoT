version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    labels:
      - "dependencies"
      - "dependabot"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "daily"
    labels:
      - "dependencies"
      - "dependabot"

  - package-ecosystem: "docker-compose"
    directory: "/"
    schedule:
      interval: "daily"
    labels:
      - "dependencies"
      - "dependabot"
    ignore:
      - dependency-name: "custom-flink-py"

  - package-ecosystem: "pip"
    directory: "/beam"
    schedule:
      interval: "daily"
    labels:
      - "dependencies"
      - "dependabot"

  - package-ecosystem: "pip"
    directory: "/flink"
    schedule:
      interval: "daily"
    labels:
      - "dependencies"
      - "dependabot"
