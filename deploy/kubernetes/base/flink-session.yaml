apiVersion: apps/v1
kind: Deployment
metadata:
  name: flink-jobmanager
  labels:
    app.kubernetes.io/name: flink-jobmanager
    app.kubernetes.io/part-of: dealiot
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: flink-jobmanager
  template:
    metadata:
      annotations:
        prometheus.io/path: /metrics
        prometheus.io/port: "9250"
        prometheus.io/scrape: "true"
      labels:
        app.kubernetes.io/name: flink-jobmanager
        app.kubernetes.io/part-of: dealiot
    spec:
      serviceAccountName: dealiot-runtime
      automountServiceAccountToken: false
      containers:
        - name: jobmanager
          image: ghcr.io/smartappli/dealiot-flink-pyflink:local-placeholder
          imagePullPolicy: IfNotPresent
          args: ["jobmanager"]
          ports:
            - name: rpc
              containerPort: 6123
            - name: rest
              containerPort: 8081
            - name: metrics
              containerPort: 9250
          envFrom:
            - configMapRef:
                name: dealiot-runtime-config
          env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: dealiot-secrets
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: dealiot-secrets
                  key: AWS_SECRET_ACCESS_KEY
            - name: KAFKA_SASL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dealiot-secrets
                  key: KAFKA_SASL_PASSWORD
            - name: ENABLE_BUILT_IN_PLUGINS
              value: flink-s3-fs-hadoop-2.0.0.jar
            - name: FLINK_PYTHON
              value: /opt/flink/venv/bin/python
            - name: PYFLINK_CLIENT_EXECUTABLE
              value: /opt/flink/venv/bin/python
            - name: FLINK_PROPERTIES
              value: |
                jobmanager.rpc.address: flink-jobmanager
                rest.address: flink-jobmanager
                rest.port: 8081
                parallelism.default: 4
                taskmanager.numberOfTaskSlots: 4
                state.backend.type: rocksdb
                state.checkpoints.dir: s3://flink-checkpoints/streaming
                execution.checkpointing.savepoint-dir: s3://flink-savepoints/streaming
                execution.checkpointing.interval: 10s
                execution.checkpointing.mode: EXACTLY_ONCE
                execution.checkpointing.timeout: 5min
                restart-strategy.type: exponential-delay
                restart-strategy.exponential-delay.initial-backoff: 2 s
                restart-strategy.exponential-delay.max-backoff: 30 s
                metrics.reporters: prom
                metrics.reporter.prom.factory.class: org.apache.flink.metrics.prometheus.PrometheusReporterFactory
                metrics.reporter.prom.port: 9250
                metrics.reporter.prom.filterLabelValueCharacters: true
                s3.endpoint: $(S3_ENDPOINT_URL)
                s3.path.style.access: true
                s3.access-key: $(AWS_ACCESS_KEY_ID)
                s3.secret-key: $(AWS_SECRET_ACCESS_KEY)
          readinessProbe:
            httpGet:
              path: /overview
              port: rest
            initialDelaySeconds: 30
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /overview
              port: rest
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 3Gi
---
apiVersion: v1
kind: Service
metadata:
  name: flink-jobmanager
  labels:
    app.kubernetes.io/name: flink-jobmanager
    app.kubernetes.io/part-of: dealiot
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: flink-jobmanager
  ports:
    - name: rpc
      port: 6123
      targetPort: rpc
    - name: rest
      port: 8081
      targetPort: rest
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flink-taskmanager
  labels:
    app.kubernetes.io/name: flink-taskmanager
    app.kubernetes.io/part-of: dealiot
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: flink-taskmanager
  template:
    metadata:
      annotations:
        prometheus.io/path: /metrics
        prometheus.io/port: "9250"
        prometheus.io/scrape: "true"
      labels:
        app.kubernetes.io/name: flink-taskmanager
        app.kubernetes.io/part-of: dealiot
    spec:
      serviceAccountName: dealiot-runtime
      automountServiceAccountToken: false
      containers:
        - name: taskmanager
          image: ghcr.io/smartappli/dealiot-flink-pyflink:local-placeholder
          imagePullPolicy: IfNotPresent
          args: ["taskmanager"]
          ports:
            - name: data
              containerPort: 6122
            - name: metrics
              containerPort: 9250
          envFrom:
            - configMapRef:
                name: dealiot-runtime-config
          env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: dealiot-secrets
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: dealiot-secrets
                  key: AWS_SECRET_ACCESS_KEY
            - name: KAFKA_SASL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dealiot-secrets
                  key: KAFKA_SASL_PASSWORD
            - name: ENABLE_BUILT_IN_PLUGINS
              value: flink-s3-fs-hadoop-2.0.0.jar
            - name: FLINK_PYTHON
              value: /opt/flink/venv/bin/python
            - name: PYFLINK_CLIENT_EXECUTABLE
              value: /opt/flink/venv/bin/python
            - name: FLINK_PROPERTIES
              value: |
                jobmanager.rpc.address: flink-jobmanager
                rest.address: flink-jobmanager
                taskmanager.data.port: 6122
                taskmanager.numberOfTaskSlots: 4
                parallelism.default: 4
                state.backend.type: rocksdb
                state.checkpoints.dir: s3://flink-checkpoints/streaming
                execution.checkpointing.savepoint-dir: s3://flink-savepoints/streaming
                execution.checkpointing.interval: 10s
                execution.checkpointing.mode: EXACTLY_ONCE
                execution.checkpointing.timeout: 5min
                metrics.reporters: prom
                metrics.reporter.prom.factory.class: org.apache.flink.metrics.prometheus.PrometheusReporterFactory
                metrics.reporter.prom.port: 9250
                metrics.reporter.prom.filterLabelValueCharacters: true
                s3.endpoint: $(S3_ENDPOINT_URL)
                s3.path.style.access: true
                s3.access-key: $(AWS_ACCESS_KEY_ID)
                s3.secret-key: $(AWS_SECRET_ACCESS_KEY)
          readinessProbe:
            tcpSocket:
              port: data
            initialDelaySeconds: 30
            periodSeconds: 15
          livenessProbe:
            tcpSocket:
              port: data
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 3Gi
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: flink-taskmanager
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: flink-taskmanager
