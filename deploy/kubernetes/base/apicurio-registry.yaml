apiVersion: apps/v1
kind: Deployment
metadata:
  name: apicurio-registry
  labels:
    app.kubernetes.io/name: apicurio-registry
    app.kubernetes.io/part-of: dealiot
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: apicurio-registry
  template:
    metadata:
      labels:
        app.kubernetes.io/name: apicurio-registry
        app.kubernetes.io/part-of: dealiot
    spec:
      serviceAccountName: dealiot-runtime
      automountServiceAccountToken: false
      containers:
        - name: registry
          image: apicurio/apicurio-registry:3.2.4
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: APICURIO_STORAGE_KIND
              value: kafkasql
            - name: APICURIO_KAFKASQL_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: dealiot-runtime-config
                  key: KAFKA_BOOTSTRAP_SERVERS
            - name: APICURIO_KAFKASQL_TOPIC
              valueFrom:
                configMapKeyRef:
                  name: dealiot-runtime-config
                  key: APICURIO_KAFKASQL_TOPIC
            - name: APICURIO_KAFKASQL_SNAPSHOTS_TOPIC
              valueFrom:
                configMapKeyRef:
                  name: dealiot-runtime-config
                  key: APICURIO_KAFKASQL_SNAPSHOTS_TOPIC
            - name: APICURIO_EVENTS_KAFKA_TOPIC
              valueFrom:
                configMapKeyRef:
                  name: dealiot-runtime-config
                  key: APICURIO_EVENTS_KAFKA_TOPIC
            - name: APICURIO_STORAGE_ENABLE_AUTOMATIC_GROUP_CREATION
              value: "true"
          readinessProbe:
            httpGet:
              path: /apis/registry/v3/system/info
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: apicurio-registry
  labels:
    app.kubernetes.io/name: apicurio-registry
    app.kubernetes.io/part-of: dealiot
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: apicurio-registry
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: apicurio-registry
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: apicurio-registry
