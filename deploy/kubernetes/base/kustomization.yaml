apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: dealiot

resources:
  - namespace.yaml
  - serviceaccount.yaml
  - configmap.yaml
  - mqtt-kafka-bridge.yaml
  - apicurio-registry.yaml
  - flink-session.yaml
  - airflow.yaml

images:
  - name: ghcr.io/smartappli/dealiot-mqtt-kafka-bridge
    newTag: latest
  - name: ghcr.io/smartappli/dealiot-flink-pyflink
    newTag: latest
  - name: ghcr.io/smartappli/dealiot-orchestration
    newTag: latest
