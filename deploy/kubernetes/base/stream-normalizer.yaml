apiVersion: apps/v1
kind: Deployment
metadata:
  name: stream-normalizer
  labels:
    app.kubernetes.io/name: stream-normalizer
    app.kubernetes.io/part-of: dealiot
spec:
  replicas: 2
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: stream-normalizer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: stream-normalizer
        app.kubernetes.io/part-of: dealiot
    spec:
      serviceAccountName: dealiot-runtime
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: normalizer
          image: ghcr.io/smartappli/dealiot-stream-normalizer:local-placeholder
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: dealiot-runtime-config
          env:
            - name: KAFKA_SASL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dealiot-secrets
                  key: KAFKA_SASL_PASSWORD
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: stream-normalizer
  labels:
    app.kubernetes.io/name: stream-normalizer
    app.kubernetes.io/part-of: dealiot
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: stream-normalizer
