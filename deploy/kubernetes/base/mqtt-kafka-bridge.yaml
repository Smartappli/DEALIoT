apiVersion: apps/v1
kind: Deployment
metadata:
  name: mqtt-kafka-bridge
  labels:
    app.kubernetes.io/name: mqtt-kafka-bridge
    app.kubernetes.io/part-of: dealiot
spec:
  replicas: 2
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: mqtt-kafka-bridge
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mqtt-kafka-bridge
        app.kubernetes.io/part-of: dealiot
    spec:
      serviceAccountName: dealiot-runtime
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: bridge
          image: ghcr.io/smartappli/dealiot-mqtt-kafka-bridge:local-placeholder
          imagePullPolicy: IfNotPresent
          ports:
            - name: health
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: dealiot-runtime-config
          env:
            - name: BRIDGE_HEALTH_BIND
              value: 0.0.0.0
            - name: MQTT_PASSWORD_FILE
              value: /var/run/dealiot-secrets/mqtt-password
            - name: KAFKA_SASL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dealiot-secrets
                  key: KAFKA_SASL_PASSWORD
          volumeMounts:
            - name: dealiot-secrets
              mountPath: /var/run/dealiot-secrets
              readOnly: true
          readinessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 768Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
      volumes:
        - name: dealiot-secrets
          secret:
            secretName: dealiot-secrets
            items:
              - key: MQTT_PASSWORD
                path: mqtt-password
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: mqtt-kafka-bridge
  labels:
    app.kubernetes.io/name: mqtt-kafka-bridge
    app.kubernetes.io/part-of: dealiot
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: mqtt-kafka-bridge
