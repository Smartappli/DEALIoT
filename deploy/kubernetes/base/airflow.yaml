metadata:
  name: airflow-worker
  labels:
    app.kubernetes.io/name: airflow
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: dealiot
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: airflow
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: airflow
        app.kubernetes.io/component: worker
        app.kubernetes.io/part-of: dealiot
    spec:
      serviceAccountName: dealiot-runtime
      automountServiceAccountToken: false
      containers:
        - name: airflow
          image: ghcr.io/smartappli/dealiot-orchestration:latest
          imagePullPolicy: IfNotPresent
          args: ["celery", "worker"]
          envFrom:
            - configMapRef:
                name: dealiot-runtime-config
            - secretRef:
                name: dealiot-secrets
          env:
            - name: DUMB_INIT_SETSID
              value: "0"
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 3Gi
