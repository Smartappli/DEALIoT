apiVersion: apps/v1
kind: Deployment
metadata:
  name: management-console
  labels:
    app.kubernetes.io/name: management-console
    app.kubernetes.io/part-of: dealiot
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: management-console
  template:
    metadata:
      labels:
        app.kubernetes.io/name: management-console
        app.kubernetes.io/part-of: dealiot
    spec:
      serviceAccountName: dealiot-runtime
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: console
          image: ghcr.io/smartappli/dealiot-management-console:local-placeholder
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: dealiot-runtime-config
          env:
            - name: MANAGEMENT_CONSOLE_PORT
              value: "8080"
            - name: MANAGEMENT_CONSOLE_PROBE_TIMEOUT_SECONDS
              value: "2"
            - name: AIRFLOW_API_URL
              value: http://airflow-apiserver:8080/api/v2
            - name: APICURIO_REGISTRY_URL
              value: http://apicurio-registry:8080/apis/registry/v3
            - name: FLINK_REST_URL
              value: http://flink-jobmanager:8081
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
---
apiVersion: v1
kind: Service
metadata:
  name: management-console
  labels:
    app.kubernetes.io/name: management-console
    app.kubernetes.io/part-of: dealiot
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: management-console
  ports:
    - name: http
      port: 8080
      targetPort: http
