apiVersion: apps/v1
kind: Deployment
metadata:
  name: mqtt-kafka-bridge
  labels:
    app.kubernetes.io/name: mqtt-kafka-bridge
    app.kubernetes.io/part-of: dealiot
    dealiot.io/environment: ci-smoke
spec:
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mqtt-kafka-bridge
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mqtt-kafka-bridge
        app.kubernetes.io/part-of: dealiot
        dealiot.io/environment: ci-smoke
    spec:
      serviceAccountName: dealiot-runtime
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: bridge
          image: ghcr.io/smartappli/dealiot-mqtt-kafka-bridge:local-placeholder
          imagePullPolicy: IfNotPresent
          command:
            - python
            - -c
            - >-
              import dealiot_contracts, time;
              print("dealiot bridge image ready", flush=True);
              time.sleep(3600)
          envFrom:
            - configMapRef:
                name: dealiot-runtime-config
          env:
            - name: MQTT_PASSWORD_FILE
              value: /var/run/dealiot-secrets/mqtt-password
          volumeMounts:
            - name: dealiot-secrets
              mountPath: /var/run/dealiot-secrets
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
      volumes:
        - name: dealiot-secrets
          secret:
            secretName: dealiot-secrets
            items:
              - key: MQTT_PASSWORD
                path: mqtt-password
