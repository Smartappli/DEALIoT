apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: dealiot-smoke

resources:
  - namespace.yaml
  - ../../base/serviceaccount.yaml
  - ../../base/configmap.yaml
  - ../../base/mqtt-kafka-bridge.yaml

images:
  - name: ghcr.io/smartappli/dealiot-mqtt-kafka-bridge
    newName: dealiot-mqtt-kafka-bridge
    newTag: ci

secretGenerator:
  - name: dealiot-secrets
    literals:
      - MQTT_PASSWORD=ci-mqtt-password

patches:
  - target:
      kind: Deployment
      name: mqtt-kafka-bridge
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: mqtt-kafka-bridge
      spec:
        replicas: 1
        template:
          spec:
            containers:
              - name: bridge
                command:
                  - python
                  - -c
                  - >-
                    import dealiot_contracts, time;
                    print("dealiot bridge image ready", flush=True);
                    time.sleep(3600)
                resources:
                  requests:
                    cpu: 50m
                    memory: 128Mi
                  limits:
                    cpu: 250m
                    memory: 256Mi
