apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: dealiot-smoke

resources:
  - namespace.yaml
  - serviceaccount.yaml
  - configmap.yaml
  - mqtt-kafka-bridge.yaml

images:
  - name: ghcr.io/smartappli/dealiot-mqtt-kafka-bridge
    newName: dealiot-mqtt-kafka-bridge
    newTag: ci

secretGenerator:
  - name: dealiot-secrets
    literals:
      - MQTT_PASSWORD=not-used-by-smoke-container
